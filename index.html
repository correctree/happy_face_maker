
<style>
  * { box-sizing: border-box; }
  .wrap { padding: 1rem 0 0.5rem; }
  .preview-wrap { display: flex; justify-content: center; }
  .polaroid { background: #fff; border: 1.5px solid #ddd; padding: 10px 10px 44px 10px; width: min(304px, 92vw); position: relative; }
  .polaroid-title { font-size: clamp(11px, 3.2vw, 13px); font-weight: 700; letter-spacing: 0.1em; text-align: center; color: #111; margin-bottom: 8px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  .face-canvas { position: relative; width: 100%; aspect-ratio: 280 / 300; background: #fff; overflow: hidden; }
  .silhouette-layer { position: absolute; inset: 0; width: 100%; height: 100%; }
  .face-part { position: absolute; font-weight: 700; line-height: 1; user-select: none; pointer-events: none; color: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  .polaroid-date { position: absolute; bottom: 10px; right: 12px; font-size: clamp(9px, 2.2vw, 10px); color: #888; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  .polaroid-num  { position: absolute; bottom: 10px; left: 12px; font-size: clamp(9px, 2.2vw, 10px); color: #ccc; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  .controls { display: flex; gap: 8px; justify-content: center; margin-top: 1.1rem; flex-wrap: wrap; }
  .btn-main { padding: 10px 20px; font-size: clamp(13px, 3.5vw, 14px); font-weight: 500; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); cursor: pointer; background: var(--color-background-primary); color: var(--color-text-primary); transition: background 0.15s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .btn-main:hover:not(:disabled), .btn-main:active:not(:disabled) { background: var(--color-background-secondary); }
  .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-dl { background: #fe0000; color: #fff; border-color: #fe0000; }
  .btn-dl:hover:not(:disabled), .btn-dl:active:not(:disabled) { background: #cc0000; }
  .status { text-align: center; font-size: clamp(12px, 3vw, 13px); color: var(--color-text-secondary); margin-top: 10px; min-height: 20px; }
  .img-preview-wrap { display: none; flex-direction: column; align-items: center; gap: 10px; margin-top: 1rem; }
  .img-preview-wrap.visible { display: flex; }
  .img-preview-wrap img { width: min(304px, 92vw); border: 1.5px solid #ddd; display: block; }
  .img-hint { font-size: clamp(11px, 2.8vw, 12px); color: var(--color-text-secondary); text-align: center; line-height: 1.6; }
</style>

<div class="wrap">
  <div class="preview-wrap">
    <div class="polaroid" id="polaroid">
      <div class="polaroid-title">HAPPY FACE MAKER</div>
      <div class="face-canvas" id="canvas">
        <canvas id="silhouette" class="silhouette-layer"></canvas>
        <div class="face-part" id="eye-l"></div>
        <div class="face-part" id="eye-r"></div>
        <div class="face-part" id="nose"></div>
        <div class="face-part" id="mouth"></div>
      </div>
      <div class="polaroid-num" id="pol-num">#001</div>
      <div class="polaroid-date" id="pol-date">----/--/-- --:--:--</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-main" id="btn-start" onclick="startSlot()">▶ スタート</button>
    <button class="btn-main" id="btn-stop" disabled onclick="stopSlot()">■ ストップ</button>
    <button class="btn-main btn-dl" id="btn-dl" disabled onclick="saveFace()">↓ PNG保存</button>
  </div>
  <div class="status" id="status">スタートを押して顔を作ろう</div>

  <div class="img-preview-wrap" id="img-preview-wrap">
    <img id="img-preview" src="" alt="生成された顔">
    <div class="img-hint" id="img-hint"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
const FILL_COLOR = '#fe0000';
let faceCount = 0, lastDate = '';
let CW = 280, CH = 300, SCALE = 1;

function isIOS(){ return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream; }
function isAndroid(){ return /Android/.test(navigator.userAgent); }

function rand(a,b){ return Math.random()*(b-a)+a; }
function randChar(){ return CHARS[Math.floor(Math.random()*CHARS.length)]; }
function randItem(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function nowString(){ const d=new Date(),p=n=>String(n).padStart(2,'0'); return`${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }

// キャンバスの実サイズを測定してグローバル変数に反映
function syncCanvasSize(){
  const el = document.getElementById('canvas');
  const rect = el.getBoundingClientRect();
  CW = Math.round(rect.width)  || 280;
  CH = Math.round(rect.height) || 300;
  SCALE = CW / 280;
  const c = document.getElementById('silhouette');
  c.width  = CW;
  c.height = CH;
}

function drawSilhouette(ctx){
  const types=['circle','ellipse-v','ellipse-h','triangle','rect','pentagon','hexagon','diamond','trapezoid','star','arrow'];
  const type = randItem(types);
  ctx.clearRect(0,0,CW,CH); ctx.fillStyle = FILL_COLOR;
  const cx = CW/2 + rand(-CW*0.04, CW*0.04);
  const cy = CH/2 + rand(-CH*0.04, CH*0.04);
  const r  = Math.min(CW,CH) * rand(0.32, 0.43);
  switch(type){
    case 'circle':     ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); break;
    case 'ellipse-v':  ctx.beginPath(); ctx.ellipse(cx,cy,r*rand(0.65,0.82),r*rand(1.05,1.25),rand(-10,10)*Math.PI/180,0,Math.PI*2); ctx.fill(); break;
    case 'ellipse-h':  ctx.beginPath(); ctx.ellipse(cx,cy,r*rand(1.05,1.25),r*rand(0.65,0.82),rand(-10,10)*Math.PI/180,0,Math.PI*2); ctx.fill(); break;
    case 'triangle':  { const sk=rand(-0.07,0.07)*CW; ctx.beginPath(); ctx.moveTo(cx+sk,cy-r); ctx.lineTo(cx-r,cy+r); ctx.lineTo(cx+r,cy+r); ctx.closePath(); ctx.fill(); break; }
    case 'rect':      { const rw=r*rand(1.2,1.7),rh=r*rand(1.3,1.8),a=rand(-12,12)*Math.PI/180; ctx.save(); ctx.translate(cx,cy); ctx.rotate(a); ctx.fillRect(-rw/2,-rh/2,rw,rh); ctx.restore(); break; }
    case 'pentagon':   drawPoly(ctx,cx,cy,r,5,rand(-20,20)); break;
    case 'hexagon':    drawPoly(ctx,cx,cy,r,6,rand(-30,30)); break;
    case 'diamond':   { const dw=r*rand(0.95,1.35),dh=r*rand(1.25,1.65); ctx.beginPath(); ctx.moveTo(cx,cy-dh/2); ctx.lineTo(cx+dw/2,cy); ctx.lineTo(cx,cy+dh/2); ctx.lineTo(cx-dw/2,cy); ctx.closePath(); ctx.fill(); break; }
    case 'trapezoid': { const tw=r*rand(0.55,0.9),bw=r*rand(1.0,1.45),th=r*rand(1.2,1.6),a=rand(-10,10)*Math.PI/180; ctx.save(); ctx.translate(cx,cy); ctx.rotate(a); ctx.beginPath(); ctx.moveTo(-tw/2,-th/2); ctx.lineTo(tw/2,-th/2); ctx.lineTo(bw/2,th/2); ctx.lineTo(-bw/2,th/2); ctx.closePath(); ctx.fill(); ctx.restore(); break; }
    case 'star':       drawStar(ctx,cx,cy,r*0.95,r*0.42,5,rand(0,36)); break;
    case 'arrow':     { const aw=r*rand(1.2,1.6),ah=r*rand(1.3,1.65),nk=rand(0.35,0.55); ctx.save(); ctx.translate(cx,cy); ctx.rotate(rand(-10,10)*Math.PI/180); ctx.beginPath(); ctx.moveTo(0,-ah/2); ctx.lineTo(aw/2,0); ctx.lineTo(aw*nk/2,0); ctx.lineTo(aw*nk/2,ah/2); ctx.lineTo(-aw*nk/2,ah/2); ctx.lineTo(-aw*nk/2,0); ctx.lineTo(-aw/2,0); ctx.closePath(); ctx.fill(); ctx.restore(); break; }
  }
}
function drawPoly(ctx,cx,cy,r,n,rotDeg){ const rot=rotDeg*Math.PI/180; ctx.beginPath(); for(let i=0;i<n;i++){ const a=rot+(2*Math.PI*i/n)-Math.PI/2; i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a)); } ctx.closePath(); ctx.fill(); }
function drawStar(ctx,cx,cy,outerR,innerR,points,rotDeg){ const rot=rotDeg*Math.PI/180; ctx.beginPath(); for(let i=0;i<points*2;i++){ const rv=i%2===0?outerR:innerR,a=rot+(Math.PI*i/points)-Math.PI/2; i===0?ctx.moveTo(cx+rv*Math.cos(a),cy+rv*Math.sin(a)):ctx.lineTo(cx+rv*Math.cos(a),cy+rv*Math.sin(a)); } ctx.closePath(); ctx.fill(); }

let silBounds = {x:50,y:50,w:180,h:200};
function updateBounds(){
  const ctx = document.getElementById('silhouette').getContext('2d');
  const data = ctx.getImageData(0,0,CW,CH).data;
  let minX=CW,maxX=0,minY=CH,maxY=0;
  for(let y=0;y<CH;y++) for(let x=0;x<CW;x++){ const i=(y*CW+x)*4; if(data[i+3]>50){ if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; } }
  if(maxX>minX) silBounds={x:minX,y:minY,w:maxX-minX,h:maxY-minY};
}
function getPos(role){
  const {x,y,w,h}=silBounds, cx=x+w/2;
  if(role==='eye-l')  return {px:cx-w*rand(0.15,0.25), py:y+h*rand(0.25,0.38)};
  if(role==='eye-r')  return {px:cx+w*rand(0.15,0.25), py:y+h*rand(0.25,0.38)};
  if(role==='nose')   return {px:cx+rand(-w*0.05,w*0.05), py:y+h*rand(0.46,0.56)};
  if(role==='mouth')  return {px:cx+rand(-w*0.06,w*0.06), py:y+h*rand(0.66,0.76)};
}
function setPart(id, char, ov){
  const el  = document.getElementById(id);
  const pos = getPos(id);
  // SCALE は syncCanvasSize() で常に最新値に更新済み
  const size  = (ov?.size  ?? rand(20,50)) * SCALE;
  const angle = ov?.angle  ?? rand(-50,50);
  el.textContent = char;
  el.style.fontSize  = size + 'px';
  el.style.left      = pos.px + 'px';
  el.style.top       = pos.py + 'px';
  el.style.transform = `translate(-50%,-50%) rotate(${angle}deg)`;
}

let animTimer=null, cdTimer=null, state='idle';

function animLoop(){
  ['eye-l','eye-r','nose','mouth'].forEach(id => setPart(id, randChar(), {}));
  drawSilhouette(document.getElementById('silhouette').getContext('2d'));
  animTimer = setTimeout(animLoop, 100);
}

function startSlot(){
  if(state !== 'idle') return;
  // レイアウト確定後にサイズ取得
  syncCanvasSize();
  document.getElementById('img-preview-wrap').classList.remove('visible');
  state = 'spinning';
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled  = false;
  document.getElementById('btn-dl').disabled    = true;
  document.getElementById('status').textContent = 'スピン中... ストップを押してください';
  document.getElementById('pol-date').textContent = '----/--/-- --:--:--';
  animLoop();
}

function stopSlot(){
  if(state !== 'spinning') return;
  state = 'stopping';
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('status').textContent = '確定まで 3 秒...';
  let cd = 3;
  cdTimer = setInterval(()=>{
    cd--;
    if(cd > 0){ document.getElementById('status').textContent = `確定まで ${cd} 秒...`; }
    else{ clearInterval(cdTimer); finalize(); }
  }, 1000);
}

function finalize(){
  clearTimeout(animTimer); animTimer = null;
  // 確定時もサイズを再同期してからシルエット・文字を描画
  syncCanvasSize();
  drawSilhouette(document.getElementById('silhouette').getContext('2d'));
  setTimeout(()=>{
    updateBounds();
    ['eye-l','eye-r','nose','mouth'].forEach(id =>
      setPart(id, randChar(), { size: rand(26,48), angle: rand(-35,35) })
    );
    faceCount++; lastDate = nowString();
    document.getElementById('pol-date').textContent = lastDate;
    document.getElementById('pol-num').textContent  = '#' + String(faceCount).padStart(3,'0');
    state = 'idle';
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-dl').disabled    = false;
    document.getElementById('status').textContent = '顔が確定！PNG保存ボタンでダウンロードできます';
  }, 50);
}

async function saveFace(){
  document.getElementById('status').textContent = '画像を生成中...';
  try{
    const rendered = await html2canvas(document.getElementById('polaroid'),{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false});
    const dataUrl  = rendered.toDataURL('image/png');
    const filename = `happyfacemaker_${lastDate.replace(/[\/: ]/g,'-')}.png`;
    if(isIOS()){
      const img = document.getElementById('img-preview');
      img.src   = dataUrl;
      document.getElementById('img-preview-wrap').classList.add('visible');
      document.getElementById('img-hint').textContent = '画像を長押し（または押し続ける）して「写真に保存」を選んでください';
      document.getElementById('status').textContent   = '↓ 下の画像を長押しして保存してください';
    } else if(isAndroid()){
      rendered.toBlob(blob=>{
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click();
        setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1000);
        document.getElementById('status').textContent = '保存しました！';
      }, 'image/png');
    } else {
      const a = document.createElement('a');
      a.href = dataUrl; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      document.getElementById('status').textContent = '保存しました！';
    }
  } catch(e){
    document.getElementById('status').textContent = '保存に失敗しました。もう一度お試しください。';
  }
}

// 初期化：DOMが確定してからサイズ取得
window.addEventListener('load', ()=>{
  syncCanvasSize();
  drawSilhouette(document.getElementById('silhouette').getContext('2d'));
  setTimeout(()=>{ updateBounds(); ['eye-l','eye-r','nose','mouth'].forEach(id=>setPart(id,randChar(),{})); }, 50);
});
</script>
